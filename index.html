<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Donos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:    #1A1A1A;
    --paper:  #F7F4EF;
    --accent: #D4500A;
    --muted:  #6B6560;
    --border: #E0DCD6;
    --card:   #FFFFFF;
    --tag-bg: #F0EDE8;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ─────────────────────────────── */
  header {
    padding: 20px 32px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--paper);
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: var(--ink);
  }
  .logo span { color: var(--accent); }

  .tagline {
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
  }

  .header-count {
    margin-left: auto;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .header-count strong {
    font-size: 20px;
    color: var(--accent);
    font-weight: 800;
    margin-right: 4px;
  }

  /* ── FILTROS ─────────────────────────────── */
  .filters {
    padding: 12px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    background: var(--paper);
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── LAYOUT PRINCIPAL ──────────────────── */
  .main {
    display: flex;
    flex: 1;
    min-height: 0;
    height: calc(100vh - 120px);
  }

  /* ── SIDEBAR ─────────────────────────────── */
  .sidebar {
    width: 340px;
    flex-shrink: 0;
    overflow-y: auto;
    border-right: 1px solid var(--border);
    background: var(--paper);
  }

  .sidebar-header {
    padding: 16px 20px 12px;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  /* ── CARD ─────────────────────────────────── */
  .card {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .12s;
    position: relative;
  }
  .card:hover { background: #F0EDE8; }
  .card.active { background: #FFF8F5; border-left: 3px solid var(--accent); }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }

  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    flex-shrink: 0;
    color: #fff;
  }

  .card-info { flex: 1; min-width: 0; }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 2px;
  }

  .card-address {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }

  .tag {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--tag-bg);
    color: var(--muted);
  }
  .tag.accent { background: #FDEEE7; color: var(--accent); font-weight: 600; }

  .card-links {
    display: flex;
    gap: 8px;
  }

  .link-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-decoration: none;
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    transition: all .12s;
  }
  .link-chip:hover { border-color: var(--accent); color: var(--accent); }
  .link-chip svg { flex-shrink: 0; }

  /* ── MAPA ─────────────────────────────────── */
  #map {
    flex: 1;
    z-index: 1;
  }

  /* Leaflet popup custom */
  .leaflet-popup-content-wrapper {
    border-radius: 10px;
    padding: 0;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,.12);
    border: 1px solid var(--border);
  }
  .leaflet-popup-content { margin: 0; width: 220px !important; }
  .leaflet-popup-tip-container { display: none; }

  .popup-inner {
    padding: 14px 16px;
    background: #fff;
  }
  .popup-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .popup-type {
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .popup-addr {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.4;
  }

  /* ── MARKER CUSTOM ─────────────────────── */
  .custom-marker {
    width: 36px;
    height: 36px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  .custom-marker span {
    transform: rotate(45deg);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 800;
    color: #fff;
  }

  /* ── FOOTER ─────────────────────────────── */
  .cta-bar {
    position: fixed;
    bottom: 20px;
    right: 24px;
    z-index: 999;
  }

  .cta-btn {
    background: var(--accent);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 12px 20px;
    border: none;
    border-radius: 24px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(212,80,10,.35);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: transform .15s, box-shadow .15s;
  }
  .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212,80,10,.4); }

  @media (max-width: 700px) {
    .main { flex-direction: column; height: auto; }
    .sidebar { width: 100%; height: 280px; border-right: none; border-bottom: 1px solid var(--border); }
    #map { height: 400px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Mapa de <span>Donos</span></div>
  <div class="tagline">Comunidade Manual de Donos · São Paulo</div>
  <div class="header-count"><strong id="visible-count">4</strong> donos mapeados</div>
</header>

<div class="filters">
  <button class="filter-btn active" onclick="filterCards('todos', this)">Todos</button>
</div>
  <button class="filter-btn" onclick="filterCards('alimentação', this)">🥖 Alimentação</button>

<div class="main">
  <aside class="sidebar">
    <div class="sidebar-header">Donos na comunidade</div>
    <div id="cards-container"></div>
  </aside>
  <div id="map"></div>
</div>

<div class="cta-bar">
  <button class="cta-btn" onclick="alert('Em breve: link para o formulário de cadastro!')">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Quero entrar no mapa
  </button>
</div>

<script>
const donos = [
  {
    id: 5,
    name: "Sagrado Boulangerie",
    tipo: "Alimentação",
    tipoTag: "alimentação",
    descricao: "Padaria semi artesanal",
    address: "Rua Dom Henrique Mourão, 158 · Santana",
    lat: -23.4914867,
    lng: -46.632341,
    color: "#7B9E5A",
    initials: "SB",
    instagram: null,
    whatsapp: null,
    tags: ["Alimentação", "Santana", "Padaria"]
  }
];

// ── MAP ────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([-23.4914867, -46.632341], 15);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  maxZoom: 19
}).addTo(map);

const markers = {};

function makeIcon(dono) {
  return L.divIcon({
    html: `<div class="custom-marker" style="background:${dono.color}"><span>${dono.initials}</span></div>`,
    className: '',
    iconSize: [36, 36],
    iconAnchor: [18, 36],
    popupAnchor: [0, -38]
  });
}

donos.forEach(d => {
  const marker = L.marker([d.lat, d.lng], { icon: makeIcon(d) }).addTo(map);
  marker.bindPopup(`
    <div class="popup-inner">
      <div class="popup-name">${d.name}</div>
      <div class="popup-type">${d.tipo}</div>
      <div class="popup-addr">${d.address}</div>
    </div>
  `, { maxWidth: 240 });
  marker.on('click', () => activateCard(d.id));
  markers[d.id] = marker;
});

// ── CARDS ──────────────────────────────────────
function renderCards(list) {
  const container = document.getElementById('cards-container');
  container.innerHTML = '';
  list.forEach(d => {
    const div = document.createElement('div');
    div.className = 'card';
    div.id = `card-${d.id}`;
    div.onclick = () => activateCard(d.id);

    const links = [];
    if (d.instagram) links.push(`<a class="link-chip" href="https://instagram.com/${d.instagram.replace('@','')}" target="_blank">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      ${d.instagram}
    </a>`);
    if (d.whatsapp) links.push(`<a class="link-chip" href="https://wa.me/${d.whatsapp.replace(/\D/g,'')}" target="_blank">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      WhatsApp
    </a>`);

    div.innerHTML = `
      <div class="card-top">
        <div class="avatar" style="background:${d.color}">${d.initials}</div>
        <div class="card-info">
          <div class="card-name">${d.name}</div>
          <div class="card-address">${d.address}</div>
        </div>
      </div>
      <div class="card-tags">
        <span class="tag accent">${d.tipo}</span>
        ${d.tags.filter(t => t !== d.tipo).map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
      ${links.length ? `<div class="card-links">${links.join('')}</div>` : ''}
    `;
    container.appendChild(div);
  });
  document.getElementById('visible-count').textContent = list.length;
}

function activateCard(id) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById(`card-${id}`);
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  const dono = donos.find(d => d.id === id);
  if (dono) {
    map.setView([dono.lat, dono.lng], 16, { animate: true });
    markers[id].openPopup();
  }
}

// ── FILTROS ────────────────────────────────────
let activeFilter = 'todos';

function filterCards(tag, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = tag;

  // hide/show markers
  const filtered = tag === 'todos' ? donos : donos.filter(d => d.tipoTag === tag);
  donos.forEach(d => {
    const m = markers[d.id];
    if (filtered.find(f => f.id === d.id)) {
      if (!map.hasLayer(m)) map.addLayer(m);
    } else {
      if (map.hasLayer(m)) map.removeLayer(m);
    }
  });
  renderCards(filtered);
}

// init
renderCards(donos);
</script>
</body>
</html>
